<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;700;800;900&amp;family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed-dim": "#ababab",
                        "inverse-surface": "#e2e2e2",
                        "primary": "#ffffff",
                        "tertiary-fixed-dim": "#464747",
                        "surface-container-lowest": "#0e0e0e",
                        "surface-tint": "#c6c6c7",
                        "primary-container": "#d4d4d4",
                        "tertiary": "#e3e2e2",
                        "error-container": "#93000a",
                        "on-secondary-fixed-variant": "#3a3c3c",
                        "on-primary": "#1a1c1c",
                        "surface-dim": "#131313",
                        "error": "#ffb4ab",
                        "on-surface": "#e2e2e2",
                        "on-error": "#690005",
                        "on-tertiary": "#1a1c1c",
                        "on-background": "#e2e2e2",
                        "tertiary-fixed": "#5d5e5f",
                        "inverse-primary": "#5d5f5f",
                        "on-secondary": "#1a1c1c",
                        "on-secondary-fixed": "#1a1c1c",
                        "on-tertiary-container": "#000000",
                        "on-primary-container": "#000000",
                        "surface-container": "#1f1f1f",
                        "outline-variant": "#474747",
                        "secondary-container": "#454747",
                        "tertiary-container": "#909191",
                        "inverse-on-surface": "#303030",
                        "outline": "#919191",
                        "on-tertiary-fixed-variant": "#e3e2e2",
                        "primary-fixed-dim": "#454747",
                        "on-tertiary-fixed": "#ffffff",
                        "surface": "#131313",
                        "surface-container-highest": "#353535",
                        "surface-bright": "#393939",
                        "background": "#131313",
                        "on-primary-fixed-variant": "#e2e2e2",
                        "on-secondary-container": "#e2e2e2",
                        "surface-container-low": "#1b1b1b",
                        "surface-container-high": "#2a2a2a",
                        "on-primary-fixed": "#ffffff",
                        "on-error-container": "#ffdad6",
                        "primary-fixed": "#5d5f5f",
                        "secondary-fixed": "#c6c6c6",
                        "on-surface-variant": "#c6c6c6",
                        "secondary": "#c6c6c6",
                        "surface-variant": "#353535"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Lexend"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #131313;
            color: #e2e2e2;
            font-family: 'Manrope', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 py-4 bg-[#131313]/80 backdrop-blur-xl">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full overflow-hidden bg-surface-container-high">
<img alt="Athlete profile avatar" class="w-full h-full object-cover" data-alt="Close-up portrait of a determined athlete with subtle sweat, dark moody lighting, high contrast cinematic style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBux9J69FDQZ_CbiuE0oS3wVkyuKKKJxG5970ax9TOmedB5qMN-hjV1TA_KCI5HiRJB5iF30lqg4oOe3_Vd1pDfB5Y1GjJmNvTVYgvsA1njGyBtdOn9JkhovV52FUIhecduMMIkCb-qVXl8R75ot0S1eSxkHAJ01Pi4SGS1G3EGJzrU008JNDu7wxRf-m6rkxxgsICUp-iOqSjh9MP3WtTmcWgbp_pMF5cXZ6KsYjQuUyXFxfvdCxrljp8SXJjmUtqphwhZSakLTLlR"/>
</div>
<h1 class="text-xl font-black tracking-[0.2em] text-white font-headline uppercase">KINETIC</h1>
</div>
<button class="text-white hover:opacity-80 transition-opacity duration-300 active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</header>
<main class="pt-24 px-6 max-w-5xl mx-auto">
<!-- Hero Section: Dynamic Greeting & Asymmetric Layout -->
<section class="mb-12">
<h2 class="font-headline font-extrabold text-5xl md:text-7xl text-white tracking-tighter leading-none mb-4">
                READY TO<br/><span class="text-on-surface-variant/40">EVOLVE?</span>
</h2>
<p class="font-body text-on-surface-variant max-w-xs ml-1">Today is a perfect day for a high-intensity interval session.</p>
</section>
<!-- Start Run CTA: Primary Action -->
<section class="mb-12">
<button class="w-full py-8 bg-gradient-to-b from-primary to-primary-container text-on-primary font-headline font-black text-2xl tracking-widest rounded-full shadow-[0_20px_50px_rgba(255,255,255,0.15)] active:scale-[0.98] transition-all duration-300 flex items-center justify-center gap-4 group">
                START RUNNING
                <span class="material-symbols-outlined text-3xl group-hover:translate-x-2 transition-transform" data-icon="play_arrow" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</button>
</section>
<!-- Stats Bento Grid -->
<section class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-12">
<div class="col-span-2 md:col-span-1 bg-surface-container-low rounded-lg p-6 flex flex-col justify-between h-48">
<span class="text-on-surface-variant text-xs font-bold tracking-[0.2em] uppercase font-label">Weekly Distance</span>
<div class="flex items-baseline gap-2">
<span class="font-headline font-black text-6xl text-white tracking-tighter">42.8</span>
<span class="font-headline font-bold text-lg text-on-surface-variant">KM</span>
</div>
</div>
<div class="bg-surface-container rounded-lg p-6 flex flex-col justify-between h-48">
<div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center">
<span class="material-symbols-outlined text-white" data-icon="local_fire_department" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
</div>
<div>
<span class="text-on-surface-variant text-xs font-bold tracking-[0.2em] uppercase block mb-1 font-label">Calories</span>
<span class="font-headline font-bold text-3xl text-white">2,840</span>
</div>
</div>
<div class="bg-surface-container-high rounded-lg p-6 flex flex-col justify-between h-48">
<div class="w-10 h-10 rounded-full bg-surface-bright flex items-center justify-center">
<span class="material-symbols-outlined text-white" data-icon="schedule">schedule</span>
</div>
<div>
<span class="text-on-surface-variant text-xs font-bold tracking-[0.2em] uppercase block mb-1 font-label">Total Time</span>
<span class="font-headline font-bold text-3xl text-white">04:12:45</span>
</div>
</div>
</section>
<!-- Last Run Preview -->
<section class="mb-8">
<div class="flex justify-between items-end mb-6">
<h3 class="font-headline font-extrabold text-2xl text-white tracking-tight uppercase">Last Run</h3>
<span class="text-on-surface-variant font-label text-sm font-bold uppercase tracking-widest">Oct 24, 2023</span>
</div>
<div class="relative group cursor-pointer overflow-hidden rounded-lg bg-surface-container-low aspect-[16/9] md:aspect-[21/9]">
<!-- Map Placeholder Representation -->
<div class="absolute inset-0 grayscale opacity-40 group-hover:opacity-60 transition-opacity duration-500">
<img alt="Map route preview" class="w-full h-full object-cover" data-alt="A stylized minimalist map with a single glowing white line path through a dark urban grid, high angle, monochromatic" data-location="Berlin" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAB8Xui5us2bRHKGM_wTjCalNgwfRLJMeJISEcG9K_tNGzGW2jOkLrlfy8ORzAWfKqT5D91nVLN4M6UUD1NMo4rcYF1orTjcatNLGr4USZa7CrTh-Q_uGW8DKCIh6CpyBmfat3fBDmmtCWVI243UukfvA-sMs0pGOoB3XAnv2M3Yd3jD5ozypVJYF54B2misbucz4I6kh2UtYeP2UL0uRVqlzINYmfJ0TLrylPrhrSzKVSU9RQysv9SVxHXZ6ozW-RhITqCUfCBeT6S"/>
</div>
<!-- Overlay Stats -->
<div class="absolute inset-0 bg-gradient-to-t from-surface/90 via-transparent to-transparent flex flex-col justify-end p-8">
<div class="flex flex-wrap items-center gap-8">
<div>
<span class="block text-[10px] font-bold tracking-widest text-on-surface-variant uppercase mb-1 font-label">Pace</span>
<span class="font-headline font-black text-3xl text-white">4'12"</span>
</div>
<div class="w-px h-10 bg-outline-variant/30"></div>
<div>
<span class="block text-[10px] font-bold tracking-widest text-on-surface-variant uppercase mb-1 font-label">Elevation</span>
<span class="font-headline font-black text-3xl text-white">124m</span>
</div>
<div class="w-px h-10 bg-outline-variant/30"></div>
<div>
<span class="block text-[10px] font-bold tracking-widest text-on-surface-variant uppercase mb-1 font-label">Heart Rate</span>
<span class="font-headline font-black text-3xl text-white">164</span>
</div>
</div>
</div>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-8 pt-4 bg-[#131313]/90 backdrop-blur-2xl rounded-t-[2.5rem] shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
<!-- RUN (Active) -->
<a class="flex flex-col items-center justify-center bg-white text-black rounded-full px-6 py-2 scale-110 shadow-xl transition-all duration-300" href="#">
<span class="material-symbols-outlined" data-icon="play_arrow" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
<span class="font-lexend text-[10px] font-bold tracking-widest uppercase mt-0.5">RUN</span>
</a>
<!-- STATS -->
<a class="flex flex-col items-center justify-center text-zinc-500 hover:text-zinc-300 px-4 py-2 transition-all duration-300" href="#">
<span class="material-symbols-outlined" data-icon="insights">insights</span>
<span class="font-lexend text-[10px] font-bold tracking-widest uppercase mt-1">STATS</span>
</a>
<!-- LOGS -->
<a class="flex flex-col items-center justify-center text-zinc-500 hover:text-zinc-300 px-4 py-2 transition-all duration-300" href="#">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-lexend text-[10px] font-bold tracking-widest uppercase mt-1">LOGS</span>
</a>
<!-- USER -->
<a class="flex flex-col items-center justify-center text-zinc-500 hover:text-zinc-300 px-4 py-2 transition-all duration-300" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-lexend text-[10px] font-bold tracking-widest uppercase mt-1">USER</span>
</a>
</nav>
</body></html>
