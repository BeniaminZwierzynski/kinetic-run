<div class="absolute inset-0 z-0 opacity-20">

<div class="absolute inset-0 bg-gradient-to-b from-surface via-transparent to-surface"></div>
</div>
<!-- Metric Cluster -->
<div class="relative z-10 flex-1 flex flex-col justify-center gap-12">
<!-- Main Duration Metric -->
<section class="flex flex-col items-start ml-4">
<span class="font-label text-[10px] font-bold tracking-[0.4em] text-on-surface-variant uppercase mb-2">Duration</span>
<h1 class="font-headline text-[7rem] md:text-[9rem] font-extrabold text-white leading-none tracking-tighter">
                    42:18
                </h1>
</section>
<!-- Secondary Metrics Bento Grid (Asymmetric) -->
<div class="grid grid-cols-2 gap-4 w-full">
<!-- Distance -->
<div class="bg-surface-container-low p-8 rounded-lg flex flex-col justify-end h-48">
<span class="font-label text-[10px] font-bold tracking-[0.4em] text-on-surface-variant uppercase mb-2">Distance</span>
<div class="flex items-baseline gap-2">
<span class="font-headline text-5xl font-bold text-white">8.42</span>
<span class="font-label text-sm font-bold text-on-surface-variant">KM</span>
</div>
</div>
<!-- Pace -->

<span class="font-label text-[10px] font-bold tracking-[0.4em] text-on-surface-variant uppercase mb-2">Avg Pace</span>
<div class="flex items-baseline gap-2">
<span class="font-headline text-5xl font-bold text-white">5'02</span>
<span class="font-label text-sm font-bold text-on-surface-variant">/KM</span>
</div>
</div>
</div>
<!-- Tertiary Metrics (Horizontal Strip) -->
<div class="flex items-center gap-12 ml-4">

<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-error text-lg" data-icon="favorite" style="font-variation-settings: 'FILL' 1;">favorite</span>
<span class="font-headline text-2xl font-bold text-white">164</span>
<span class="font-label text-[10px] text-on-surface-variant ml-1">BPM</span>
</div>
</div>
<div class="flex flex-col">
<span class="font-label text-[10px] font-bold tracking-[0.4em] text-on-surface-variant uppercase mb-1">Calories</span>
<div class="flex items-center gap-2">
<span class="font-headline text-2xl font-bold text-white">542</span>
<span class="font-label text-[10px] text-on-surface-variant ml-1">KCAL</span>
</div>
</div>
</div>
</div>

<span class="font-headline text-xl font-black tracking-widest uppercase">Pause Workout</span>
</button>
</div>

<a class="flex flex-col items-center justify-center bg-white text-black rounded-full px-6 py-2 scale-110 shadow-xl transition-all cubic-bezier(0.4, 0, 0.2, 1)" href="#">
